<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>홖 — 손으로 만지는 것들</title>
  <style>
    html, body { height: 100%; margin: 0; background:#000; overflow:hidden; }
    /* touch-action/cursor 는 원본에 있던 것 — 옮기면서 빠뜨렸다가 되살림 */
    .stage {
      position: fixed; inset: 0; display: none; width: 100%; height: 100%;
      touch-action: none; cursor: crosshair;
    }
    .stage.on { display: block; }

    /* ── Tab = 전시 모드 ── 작품만 남기고 전부 숨긴다. 손 인식은 계속 돈다(화면만 사라짐). */
    body.bare #menu,
    body.bare #hand-ui,
    body.bare #hand-cam,
    body.bare #panel,
    body.bare #hint { display: none !important; }
    body.bare .stage { cursor: none; }

    /* ── 메뉴 ── 작품을 가리지 않게 최소한으로 */
    #menu {
      position: fixed; left: 14px; top: 14px; z-index: 10; display: flex; gap: 6px;
      font: 12px/1 -apple-system, system-ui, sans-serif; user-select: none;
    }
    .menu-item {
      padding: 6px 11px; border-radius: 7px; cursor: pointer;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.5); backdrop-filter: blur(8px);
      transition: background .15s, color .15s, border-color .15s;
    }
    .menu-item:hover { background: rgba(255,255,255,.14); color: rgba(255,255,255,.8); }
    .menu-item.on { border-color: rgba(255,255,255,.5); color: #fff; background: rgba(255,255,255,.14); }
    .menu-item b { font-weight: 600; opacity: .5; margin-right: 5px; }
    .menu-item.on b { opacity: .9; }

    /* ── 손 인식 ── */
    #hand-ui {
      position: fixed; left: 14px; top: 52px; z-index: 10;
      font: 12px/1.5 -apple-system, system-ui, sans-serif; color: rgba(255,255,255,.5);
      user-select: none;
    }
    #hand-btn {
      padding: 5px 11px; border-radius: 7px; font: inherit;
      background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.75); cursor: pointer; backdrop-filter: blur(8px);
      transition: background .2s ease;
    }
    #hand-btn:hover { background: rgba(255,255,255,.16); }
    #hand-btn.on { border-color: rgba(232,81,96,.6); color: #E85160; }
    #hand-stat { margin-top: 6px; font-variant-numeric: tabular-nums; font-size: 11px; white-space: pre-line; }
    #hand-stat.err { color: #E85160; }
    /* openness 막대 — 자기 손이 어디쯤인지 보이면 튜닝이 감이 아니라 눈이 된다 */
    #grab-meter { display:none; margin-top: 7px; width: 150px; }
    #grab-meter.on { display: block; }
    #grab-bar { position: relative; height: 5px; border-radius: 3px; background: rgba(255,255,255,.14); }
    #grab-fill { position:absolute; left:0; top:0; bottom:0; width:0; border-radius:3px; background:#5DC4E6; transition: background .15s; }
    #grab-fill.grab { background: #E85160; }
    .grab-mark { position:absolute; top:-3px; bottom:-3px; width:1px; background:rgba(255,255,255,.45); }
    #grab-legend { display:flex; justify-content:space-between; font-size:10px; margin-top:3px; color:rgba(255,255,255,.35); }
    #scale-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:7px; font-size:11px; }
    #scale-val { font-variant-numeric: tabular-nums; }
    #cal-btn {
      padding:2px 7px; border-radius:5px; font:inherit; font-size:10px;
      background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.2);
      color:rgba(255,255,255,.6); cursor:pointer;
    }
    #cal-btn:hover { background:rgba(255,255,255,.18); color:#fff; }
    #beta-row { margin-top:8px; font-size:10px; color:rgba(255,255,255,.45); }
    #beta-slider {
      -webkit-appearance:none; appearance:none; width:150px; height:3px; margin-top:4px;
      background:rgba(255,255,255,.18); border-radius:2px; outline:none; cursor:pointer; display:block;
    }
    #beta-slider::-webkit-slider-thumb {
      -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:#5DC4E6; cursor:pointer;
    }
    #hand-cam { position: fixed; right: 14px; bottom: 14px; z-index: 10; width: 200px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,.14); display: none; }
    #hand-cam.on { display: block; }
    .ctl-check {
      display: flex; align-items: center; gap: 6px; margin-top: 9px;
      font-size: 11px; color: rgba(255,255,255,.55); cursor: pointer;
    }
    .ctl-check input { accent-color: #5DC4E6; }

    /* ── 조절 패널 (2번 장면 전용) ── 원본 thread field 의 것 그대로 */
    #panel {
      position: fixed; top: 14px; right: 14px; z-index: 20; display: none;
      font: 12px -apple-system, system-ui, sans-serif; color: rgba(255,255,255,.78);
      user-select: none;
    }
    #panel.on { display: block; }
    #panel-toggle {
      width: 34px; height: 34px; padding: 0; border-radius: 9px; margin-left: auto;
      background: rgba(18,18,22,.62); border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.72); font-size: 16px; cursor: pointer; line-height: 1;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      transition: background .2s ease;
    }
    #panel-toggle:hover { background: rgba(30,30,36,.8); }
    #panel-body {
      margin-top: 8px; padding: 15px 15px 13px; width: 208px;
      background: rgba(18,18,22,.62); border: 1px solid rgba(255,255,255,.14);
      border-radius: 11px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: none;
    }
    #panel-body.open { display: block; }
    .ctl { display: grid; grid-template-columns: 1fr auto;
      grid-template-areas: "name val" "slider slider"; align-items: center; }
    .ctl + .ctl { margin-top: 15px; }
    .ctl-name { grid-area: name; letter-spacing: .03em; }
    .ctl-val { grid-area: val; font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,.5); font-size: 11px; }
    .ctl input[type=range] {
      grid-area: slider; -webkit-appearance: none; appearance: none;
      width: 100%; height: 3px; margin: 9px 0 2px; outline: none; cursor: pointer;
      background: rgba(255,255,255,.18); border-radius: 2px;
    }
    .ctl input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #58c2e5; border: none; cursor: pointer;
    }
    /* 밀어내기/당김 비율 잠금 그룹 */
    .link-group { display: flex; align-items: stretch; gap: 6px; margin-top: 15px; }
    .link-rows { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 15px; }
    .link-rows .ctl { margin-top: 0; }
    .link-btn {
      flex: 0 0 30px; position: relative; align-self: stretch; padding: 0;
      display: flex; align-items: center; justify-content: flex-end;
      background: transparent; border: none; color: rgba(255,255,255,.32); cursor: pointer;
      transition: color .2s ease;
    }
    .link-btn::before {
      content: ''; position: absolute; left: 4px; top: 9px; bottom: 9px; width: 9px;
      border: 1.5px solid currentColor; border-left: none; border-radius: 0 6px 6px 0; opacity: .55;
    }
    .link-btn:hover { color: rgba(255,255,255,.6); }
    .link-btn.on { color: #58c2e5; }
    .link-btn svg { position: relative; z-index: 1; }
    #panel-reset {
      width: 100%; margin-top: 15px; padding: 5px; border-radius: 6px; font: inherit; font-size: 11px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.6); cursor: pointer;
    }
    #panel-reset:hover { background: rgba(255,255,255,.16); color: #fff; }

    #hint {
      position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); z-index: 5;
      color: rgba(255,255,255,.3); font: 12px/1.4 -apple-system, system-ui, sans-serif;
      letter-spacing: .04em; pointer-events: none; text-align: center;
      transition: opacity .8s ease;
    }
  </style>
</head>
<body>
  <canvas id="stage-particles" class="stage on"></canvas>
  <canvas id="stage-threads" class="stage"></canvas>

  <div id="menu">
    <div class="menu-item on" data-scene="0"><b>1</b>입자 분사</div>
    <div class="menu-item" data-scene="1"><b>2</b>실뭉치</div>
  </div>

  <div id="hand-ui">
    <button id="hand-btn">✋ 손으로 조작</button>
    <div id="hand-stat"></div>
    <div id="grab-meter">
      <div id="grab-bar"><div id="grab-fill"></div></div>
      <div id="grab-legend"><span>주먹</span><span>편 손</span></div>
      <div id="scale-row">
        <span id="scale-val">배율 —</span>
        <button id="cal-btn" title="지금 손 위치를 기준 거리로 삼습니다">여기가 기준</button>
      </div>
      <!-- 빠르게 휘두를 때 손을 얼마나 잘 따라오는가. 올릴수록 덜 뒤처지고,
           정지 시 떨림에는 영향이 없다(속도가 0이면 이 값이 안 곱해지므로). -->
      <div id="beta-row">
        <span id="beta-val"></span>
        <input type="range" id="beta-slider" min="0" max="30" step="0.5">
      </div>
    </div>
    <label class="ctl-check"><input type="checkbox" id="cam-preview" checked> <span>카메라 미리보기</span></label>
  </div>
  <canvas id="hand-cam"></canvas>

  <!-- 조절 패널 — 2번 장면(실뭉치) 전용. 원본 thread field 의 것 그대로. -->
  <div id="panel">
    <button id="panel-toggle" aria-label="조절 패널 열기/닫기">⚙</button>
    <div id="panel-body">
      <label class="ctl">
        <span class="ctl-name">실 굵기</span>
        <span class="ctl-val" id="val-line"></span>
        <input type="range" id="ctl-line" min="0.3" max="4" step="0.05">
      </label>
      <label class="ctl">
        <span class="ctl-name">손/커서 범위</span>
        <span class="ctl-val" id="val-radius"></span>
        <input type="range" id="ctl-radius" min="40" max="450" step="5">
      </label>
      <div class="link-group">
        <div class="link-rows">
          <label class="ctl">
            <span class="ctl-name">밀어내기</span>
            <span class="ctl-val" id="val-push"></span>
            <input type="range" id="ctl-push" min="0" max="5" step="0.05">
          </label>
          <label class="ctl">
            <span class="ctl-name">당김</span>
            <span class="ctl-val" id="val-brush"></span>
            <input type="range" id="ctl-brush" min="0" max="1.2" step="0.01">
          </label>
        </div>
        <button class="link-btn" id="link-toggle" aria-label="밀어내기·당김 비율 잠금" title="비율 잠금">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 12h6"/>
            <path d="M10.5 8.5H8a3.5 3.5 0 0 0 0 7h2.5"/>
            <path d="M13.5 8.5H16a3.5 3.5 0 0 1 0 7h-2.5"/>
          </svg>
        </button>
      </div>
      <label class="ctl">
        <span class="ctl-name">부유 강도</span>
        <span class="ctl-val" id="val-float"></span>
        <input type="range" id="ctl-float" min="0" max="12" step="0.25">
      </label>
      <label class="ctl">
        <span class="ctl-name">복원 속도</span>
        <span class="ctl-val" id="val-spring"></span>
        <input type="range" id="ctl-spring" min="0.008" max="0.15" step="0.001">
      </label>

      <!-- ── 움켜쥐기 — 당김 느낌의 다섯 레버, 각각 켜고 꺼서 비교 ──
           잡기 방식(전파/통째)은 다음에 잡을 때부터, 나머지 셋은 잡은 채로도 즉시 적용 -->
      <div style="margin:15px 0 4px; letter-spacing:.03em; color:rgba(255,255,255,.78);
                  border-top:1px solid rgba(255,255,255,.12); padding-top:12px;">움켜쥐기</div>
      <label class="ctl-check"><input type="checkbox" id="g-tension"> <span>장력 전파 — 이웃 실이 딸려옴</span></label>
      <label class="ctl-check"><input type="checkbox" id="g-stroke"> <span>실 통째로 잡기 (켜면 위는 무시됨)</span></label>
      <label class="ctl-check"><input type="checkbox" id="g-resist"> <span>저항 — 뭉치가 무겁게 뒤처짐</span></label>
      <label class="ctl-check"><input type="checkbox" id="g-fist"> <span>주먹 폭 — 한 점이 아니라 한 줌</span></label>
      <label class="ctl-check"><input type="checkbox" id="g-life"> <span>생기 — 잡힌 실도 숨쉼</span></label>

      <button id="panel-reset">기본값으로</button>
    </div>
  </div>
  <div id="hint">1 / 2 로 전환 · Tab 으로 화면만 보기 · ✋ 를 켜고 주먹을 쥐어보세요</div>

<script type="module">
// ─────────────────────────────────────────────────────────────────────────────
// 껍데기 — 카메라와 시간을 쥐고, 장면만 갈아끼운다.
//
// 왜 한 페이지인가: 장면마다 페이지를 나누면 전환할 때마다 MediaPipe(18MB)를 다시 초기화하고
// 카메라를 다시 열어야 한다. 1초쯤 끊기고 보정값(여기가 기준)도 날아간다. 껍데기가 카메라를
// 쥐고 있으면 전환이 즉시고, 두 작품이 같은 손을 공유한다.
//
// ★ sample() 은 프레임당 딱 한 번만 부른다. 이 함수는 부를 때마다 렌더용 위치를 시간에 따라
//   굴리므로(톱니 제거), 작품·HUD·미리보기가 각자 부르면 같은 일을 세 번 하게 된다.
// ─────────────────────────────────────────────────────────────────────────────
import { HandSource, TUNE as HTUNE, palmsOf } from './hand/hand-source.js';
import * as particles from './scenes/particles.js';
import * as threads from './scenes/threads.js';

const scenes = [
  particles.create(document.getElementById('stage-particles')),
  threads.create(document.getElementById('stage-threads')),
];
let cur = 0;
let hands = null;

// ── 장면 전환 ──
const items = [...document.querySelectorAll('.menu-item')];
const hint = document.getElementById('hint');
let hintHidden = false;

function show(i) {
  if (i === cur || !scenes[i]) return;
  scenes[cur].deactivate?.();          // 떠나는 장면은 상태를 되돌린다 (돌아왔을 때 잔해 없게)
  cur = i;
  scenes.forEach((s, n) => s.canvas.classList.toggle('on', n === i));
  items.forEach((el, n) => el.classList.toggle('on', n === i));
  scenes[i].resize();                  // 숨어 있는 동안 창이 바뀌었을 수 있다
  document.getElementById('panel').classList.toggle('on', i === 1);   // 조절 패널은 실뭉치 전용
}
items.forEach((el, i) => el.addEventListener('click', () => show(i)));
addEventListener('keydown', (e) => {
  if (e.key === '1') show(0);
  if (e.key === '2') show(1);
  // Tab = 전시 모드. 작품만 남기고 UI·카메라 미리보기를 전부 숨긴다.
  // 손 인식은 계속 돈다 — 화면에서만 사라진다. (기본 동작인 포커스 이동은 막는다)
  if (e.key === 'Tab') { e.preventDefault(); document.body.classList.toggle('bare'); }
});
addEventListener('resize', () => scenes.forEach(s => s.resize()));

// ── 시간 기준 ──
// 두 작품 다 원래는 프레임 기준이었다 — dt가 없어서 화면 주사율이 곧 작품 속도였다.
// (실측: 입자가 60Hz 893px/초 vs 120Hz 1787px/초. 갤러리 프로젝터는 대개 60Hz다.)
// k = 이번 프레임이 60Hz 한 프레임의 몇 배인가. 60Hz면 1 = 원본과 완전히 동일.
const REF_DT = 1000 / 60, MAX_K = 3;   // MAX_K: 탭이 멈췄다 돌아올 때 폭주 방지
let fps = 60, lastT = 0;

function loop(now) {
  requestAnimationFrame(loop);
  let k = 1;
  if (lastT) {
    const dt = now - lastT;
    if (dt > 0) { fps = fps * 0.9 + (1000 / dt) * 0.1; k = Math.min(dt / REF_DT, MAX_K); }
  }
  lastT = now;

  // ★ 프레임당 한 번. 어트랙터(손바닥+손끝)는 실뭉치가, 손 목록은 입자와 HUD가 쓴다.
  const attractors = hands && hands.state === 'ready' ? hands.sample(now) : null;
  const palms = attractors ? palmsOf(attractors) : null;

  scenes[cur].frame(now, k, cur === 1 ? attractors : palms);

  drawCam(palms);
  if (!hintHidden && palms && palms.length) { hint.style.opacity = '0'; hintHidden = true; }
}
requestAnimationFrame(loop);

// ── 손 인식 UI ──
const btn = document.getElementById('hand-btn');
const stat = document.getElementById('hand-stat');
const meter = document.getElementById('grab-meter');
const bar = document.getElementById('grab-bar');
const fill = document.getElementById('grab-fill');
const cam = document.getElementById('hand-cam');
const cctx = cam.getContext('2d');
const scaleVal = document.getElementById('scale-val');
const calBtn = document.getElementById('cal-btn');
const betaSlider = document.getElementById('beta-slider');
const betaVal = document.getElementById('beta-val');

// 막대 위에 임계값 두 개를 표시 — 자기 손이 어디쯤인지 보여야 튜닝이 감이 아니라 눈이 된다
const LO = 0.7, HI = 1.9;
const pos = v => ((v - LO) / (HI - LO)) * 100;
for (const v of [HTUNE.grabOn, HTUNE.grabOff]) {
  const m = document.createElement('div');
  m.className = 'grab-mark'; m.style.left = pos(v) + '%';
  bar.appendChild(m);
}

// beta = 빠를 때 얼마나 잘 따라오는가. 실측: 0.007 → 540px 뒤처짐 / 10 → 109px.
// 필터는 살아있는 인스턴스가 값을 들고 있으므로 트랙에 직접 밀어넣어야 반영된다.
const setBeta = (v) => {
  HTUNE.beta = v;
  betaVal.textContent = `따라오기 ${v.toFixed(1)}`;
  if (!hands) return;
  for (const [, t] of hands.tracks)
    for (const f of [t.px, t.py, ...t.tx, ...t.ty]) f.beta = v;
};
betaSlider.value = HTUNE.beta;
setBeta(HTUNE.beta);
betaSlider.addEventListener('input', () => setBeta(parseFloat(betaSlider.value)));

// 기준 거리는 카메라 화각마다 달라서 코드가 정할 수 없다. 그 자리에서 맞춘다.
calBtn.addEventListener('click', () => {
  if (!hands) return;
  const h = hands.sampleHands(performance.now())[0];
  if (!h || !h.size) { scaleVal.textContent = '손이 안 보임'; return; }
  HTUNE.sizeRef = h.size;
  scaleVal.textContent = `기준 = ${h.size.toFixed(3)}`;
});

function paint() {
  if (!hands) { stat.textContent = ''; stat.classList.remove('err'); meter.classList.remove('on'); return; }
  const i = hands.info();
  stat.classList.toggle('err', i.state === 'error');
  if (i.state === 'error') { stat.textContent = '오류: ' + i.error; meter.classList.remove('on'); return; }
  if (i.state !== 'ready') { stat.textContent = '카메라/모델 로드 중…'; return; }
  const hs = hands.sampleHands(performance.now());
  const grabbing = hs.filter(h => h.grab).length;
  const c = i.camera ? `${i.camera.w}×${i.camera.h}` : '?';
  stat.textContent =
      `손 ${hs.length}개 · 움켜쥠 ${grabbing}개\n`
    + `화면 ${fps.toFixed(0)}fps · ${scenes[cur].stats()}\n`
    // ★ 순간이동의 원인을 가르는 두 숫자.
    //   카메라 = 검출 이면 카메라가 천장(워커 늘려도 무의미) / 카메라 > 검출 이면 처리량이 천장
    + `카메라 ${i.captureFps}장/초 (${c})\n`
    + `검출 ${i.detectFps}회/초 · ${i.detectMs.toFixed(0)}ms · 버림 ${i.droppedPct}%`;
  meter.classList.toggle('on', hs.length > 0);
  if (hs.length) {
    const h = hs[0];
    fill.style.width = Math.max(0, Math.min(100, pos(h.openness))) + '%';
    fill.classList.toggle('grab', h.grab);
    // 배율이 상·하한에 붙어 있으면 알려준다 — 안 그러면 "왜 더 안 커지지?" 로 헤맨다
    const at = h.scale <= HTUNE.sizeMin + 1e-6 ? ' (최소)'
             : h.scale >= HTUNE.sizeMax - 1e-6 ? ' (최대)' : '';
    scaleVal.textContent = `배율 ${h.scale.toFixed(2)}×${at}`;
  }
}
setInterval(paint, 100);

btn.addEventListener('click', async () => {
  if (hands) {
    hands.stop(); hands = null;
    btn.textContent = '✋ 손으로 조작'; btn.classList.remove('on');
    cam.classList.remove('on'); paint();
    return;
  }
  hands = new HandSource();
  hands.onstate = paint;
  btn.textContent = '■ 끄기'; btn.classList.add('on');
  cam.classList.toggle('on', camChk.checked);
  await hands.start();
  paint();
});

// 카메라 미리보기 — 인식 영역(파랑)과 손바닥(움켜쥐면 빨강)
function drawCam(palms) {
  if (!cam.classList.contains('on') || !hands || !hands.video || !hands.video.videoWidth) return;
  const v = hands.video, W = 200, H = Math.round(W * v.videoHeight / v.videoWidth);
  if (cam.width !== W) { cam.width = W; cam.height = H; cam.style.height = H + 'px'; }
  cctx.save();
  if (HTUNE.mirror) { cctx.translate(W, 0); cctx.scale(-1, 1); }
  cctx.drawImage(v, 0, 0, W, H);
  cctx.restore();

  // ★ 여기에 미러 분기를 넣으면 안 된다 — 두 번 뒤집혀서 점이 반대편에 찍힌다.
  //   hand-source 의 map() 이 이미 미러를 적용해 nx 를 만들고(m = 1 - 영상x),
  //   미리보기도 영상을 미러로 그린다(화면x = (1 - 영상x)·W). 둘이 정확히 상쇄된다:
  //     m = ax0 + nx·(ax1-ax0)   →   영상x = 1 - m   →   화면x = (1 - 영상x)·W = m·W
  //   즉 미러든 아니든 화면 좌표는 m·W 하나뿐이다.
  //   (사각형도 같은 버그였는데 ax0/ax1 이 0.15/0.85 로 좌우 대칭이라 우연히 안 보였다)
  const toPreviewX = (nx) => (HTUNE.ax0 + nx * (HTUNE.ax1 - HTUNE.ax0)) * W;
  const toPreviewY = (ny) => (HTUNE.ay0 + ny * (HTUNE.ay1 - HTUNE.ay0)) * H;

  cctx.strokeStyle = 'rgba(93,196,230,.9)'; cctx.lineWidth = 1;
  cctx.strokeRect(toPreviewX(0), toPreviewY(0), toPreviewX(1) - toPreviewX(0), toPreviewY(1) - toPreviewY(0));
  if (!palms) return;
  for (const h of palms) {
    cctx.beginPath(); cctx.arc(toPreviewX(h.nx), toPreviewY(h.ny), h.grab ? 8 : 5, 0, 6.2832);
    cctx.fillStyle = h.grab ? 'rgba(232,81,96,.9)' : 'rgba(255,255,255,.5)';
    cctx.fill();
  }
}

// ── 카메라 미리보기 켜기/끄기 ──
// 작품을 가리므로 끌 수 있어야 한다. 끄더라도 손 인식은 계속 돈다 — 화면에서만 사라진다.
const camChk = document.getElementById('cam-preview');
camChk.addEventListener('change', () => cam.classList.toggle('on', camChk.checked && !!hands));

// ── 조절 패널 (2번 장면 전용) ── 원본 thread field 의 것 그대로
(function panelUI() {
  const th = scenes[1], P = th.P;
  const DEFAULTS = { ...P };            // "기본값으로" 를 위해 시작값을 붙잡아둔다
  const $ = (id) => document.getElementById(id);
  const cLine = $('ctl-line'), cRad = $('ctl-radius');
  const cPush = $('ctl-push'), cBrush = $('ctl-brush'), cFloat = $('ctl-float'), cSpring = $('ctl-spring');
  const vLine = $('val-line'), vRad = $('val-radius');
  const vPush = $('val-push'), vBrush = $('val-brush'), vFloat = $('val-float'), vSpring = $('val-spring');
  const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
  const PUSH_MIN = 0, PUSH_MAX = 5, BR_MIN = 0, BR_MAX = 1.2;

  // 현재 값으로 초기화 (작은 화면이면 radius 가 이미 120으로 내려가 있다)
  function sync() {
    cLine.value = P.line;       vLine.textContent = (+P.line).toFixed(2) + ' px';
    cRad.value = P.radius;      vRad.textContent = Math.round(P.radius);
    cPush.value = P.push;       vPush.textContent = (+P.push).toFixed(2);
    cBrush.value = P.brush;     vBrush.textContent = (+P.brush).toFixed(2);
    cFloat.value = P.floatAmp;  vFloat.textContent = (+P.floatAmp).toFixed(1);
    cSpring.value = P.restK;    vSpring.textContent = (+P.restK).toFixed(3);
  }
  sync();

  cLine.addEventListener('input', () => {
    P.line = parseFloat(cLine.value); vLine.textContent = P.line.toFixed(2) + ' px';
  });
  cRad.addEventListener('input', () => {
    P.radius = parseFloat(cRad.value); vRad.textContent = Math.round(P.radius);
  });
  cFloat.addEventListener('input', () => {
    P.floatAmp = parseFloat(cFloat.value); vFloat.textContent = P.floatAmp.toFixed(1);
  });
  cSpring.addEventListener('input', () => {
    P.restK = parseFloat(cSpring.value); vSpring.textContent = P.restK.toFixed(3);
  });

  // ── 밀어내기/당김 + 비율 잠금(체인) ──
  let linkOn = false;
  let prevPush = P.push, prevBrush = P.brush;   // 직전 값(비율 계산용)
  const setPush  = (v) => { P.push = v;  cPush.value = v;  vPush.textContent = v.toFixed(2); };
  const setBrush = (v) => { P.brush = v; cBrush.value = v; vBrush.textContent = v.toFixed(2); };

  cPush.addEventListener('input', () => {
    const np = parseFloat(cPush.value);
    if (linkOn && prevPush > 0.0001) {           // 같은 배율로 당김도 이동
      setBrush(clamp(prevBrush * (np / prevPush), BR_MIN, BR_MAX));
    }
    P.push = np; vPush.textContent = np.toFixed(2);
    prevPush = P.push; prevBrush = P.brush;
  });
  cBrush.addEventListener('input', () => {
    const nb = parseFloat(cBrush.value);
    if (linkOn && prevBrush > 0.0001) {          // 같은 배율로 밀어내기도 이동
      setPush(clamp(prevPush * (nb / prevBrush), PUSH_MIN, PUSH_MAX));
    }
    P.brush = nb; vBrush.textContent = nb.toFixed(2);
    prevPush = P.push; prevBrush = P.brush;
  });

  const link = $('link-toggle');
  link.addEventListener('click', () => {
    linkOn = !linkOn;
    link.classList.toggle('on', linkOn);
    prevPush = P.push; prevBrush = P.brush;      // 잠그는 순간의 비율을 기준으로
  });

  // ── 움켜쥐기 토글 ── 잡기 방식(전파/통째)은 다음 잡기부터, 나머지는 잡은 채로도 즉시 적용
  const G = th.G;
  const G_DEFAULTS = { ...G };
  const gBoxes = [['g-tension','tension'], ['g-stroke','strokeWhole'], ['g-resist','resistance'],
                  ['g-fist','fistWidth'], ['g-life','life']];
  const syncG = () => { for (const [id, key] of gBoxes) $(id).checked = G[key]; };
  syncG();
  for (const [id, key] of gBoxes)
    $(id).addEventListener('change', () => { G[key] = $(id).checked; });

  $('panel-reset').addEventListener('click', () => {
    Object.assign(P, DEFAULTS);
    Object.assign(G, G_DEFAULTS);
    prevPush = P.push; prevBrush = P.brush;
    sync(); syncG();
  });

  const tgl = $('panel-toggle'), body = $('panel-body');
  tgl.addEventListener('click', () => body.classList.toggle('open'));
})();

// 튜닝/검증용
window.__app = {
  get hands() { return hands; },
  set hands(v) { hands = v; },
  get scene() { return scenes[cur]; },
  get sceneIndex() { return cur; },
  show, scenes, TUNE: HTUNE,
  get fps() { return fps; },
};
</script>
</body>
</html>
